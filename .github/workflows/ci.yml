# CI — epy_reports (public, MIT; no private suite dependencies).
# Trimmed from the ePy Suite canonical template: no SUITE_PAT auth is
# needed here. pyright is intentionally omitted — the project has no
# pyrightconfig.json / [tool.pyright] section yet; add a typecheck job
# once that lands.
name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.11.0"
      - name: ruff check
        run: ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Qt runtime libraries (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -q

  build:
    name: Build distribution
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
