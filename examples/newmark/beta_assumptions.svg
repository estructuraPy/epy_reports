<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="serif" font-size="13">
  <title>Hipotesis de variacion de la aceleracion en el intervalo</title>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
  </defs>
  <text x="200" y="22" text-anchor="middle" font-size="14">Hipotesis de variacion de la aceleracion entre t_n y t_n + Dt</text>
  <line x1="60" y1="270" x2="60" y2="50" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="60" y1="270" x2="380" y2="270" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="35" y="42" text-anchor="end" font-style="italic">u(t)</text>
  <text x="35" y="56" text-anchor="end" font-style="italic" font-size="11">(aceleracion)</text>
  <text x="380" y="288" text-anchor="end" font-style="italic">Tiempo (t)</text>
  <line x1="140" y1="270" x2="140" y2="275" stroke="#222"/>
  <text x="140" y="288" text-anchor="middle" font-style="italic">t_n</text>
  <line x1="340" y1="270" x2="340" y2="275" stroke="#222"/>
  <text x="340" y="288" text-anchor="middle" font-style="italic">t_n + Dt</text>
  <line x1="140" y1="220" x2="60" y2="220" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="100" x2="60" y2="100" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="53" y="224" text-anchor="end" font-style="italic">u_n</text>
  <text x="53" y="104" text-anchor="end" font-style="italic">u_(n+1)</text>
  <line x1="140" y1="220" x2="340" y2="100" stroke="#1d4f8c" stroke-width="2.5"/>
  <line x1="140" y1="160" x2="340" y2="160" stroke="#b03030" stroke-width="2" stroke-dasharray="8,4"/>
  <line x1="140" y1="220" x2="140" y2="160" stroke="#b03030" stroke-width="2" stroke-dasharray="8,4"/>
  <line x1="340" y1="160" x2="340" y2="100" stroke="#b03030" stroke-width="2" stroke-dasharray="8,4"/>
  <line x1="140" y1="220" x2="240" y2="220" stroke="#2f7a3a" stroke-width="2" stroke-dasharray="2,4"/>
  <line x1="240" y1="220" x2="240" y2="100" stroke="#2f7a3a" stroke-width="2" stroke-dasharray="2,4"/>
  <line x1="240" y1="100" x2="340" y2="100" stroke="#2f7a3a" stroke-width="2" stroke-dasharray="2,4"/>
  <circle cx="140" cy="220" r="4" fill="#222"/>
  <circle cx="340" cy="100" r="4" fill="#222"/>
  <line x1="395" y1="70" x2="430" y2="70" stroke="#1d4f8c" stroke-width="2.5"/>
  <text x="440" y="74" fill="#1d4f8c" font-style="italic">b = 1/6 (lineal)</text>
  <line x1="395" y1="110" x2="430" y2="110" stroke="#b03030" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="114" fill="#b03030" font-style="italic">b = 1/4 (promedio constante)</text>
  <line x1="395" y1="150" x2="430" y2="150" stroke="#2f7a3a" stroke-width="2" stroke-dasharray="2,4"/>
  <text x="440" y="154" fill="#2f7a3a" font-style="italic">b = 1/8 (escalonada)</text>
  <text x="440" y="194" font-size="11" fill="#555">Estabilidad incondicional:</text>
  <text x="440" y="210" font-size="11" fill="#555" font-style="italic">2b &gt;= g &gt;= 1/2</text>
  <text x="300" y="312" text-anchor="middle" fill="#555" font-size="11">b = 0 corresponde a u = u_n constante durante todo el paso.</text>
</svg>
